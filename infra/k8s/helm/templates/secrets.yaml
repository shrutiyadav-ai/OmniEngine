# =============================================================================
# OmniEngine — Kubernetes Secrets
# =============================================================================
# WARNING: In production, use an external secret manager (e.g., Vault,
# AWS Secrets Manager, GCP Secret Manager) with External Secrets Operator.
# This template is for initial setup and dev/staging environments.
#
# Override values at install time:
#   helm install omniengine ./infra/k8s/helm \
#     --set secrets.openaiApiKey=sk-xxx \
#     --set secrets.postgresPassword=xxx
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "omniengine.fullname" . }}-secrets
  labels:
    {{- include "omniengine.labels" . | nindent 4 }}
  annotations:
    description: "OmniEngine API keys and database credentials"
type: Opaque
data:
  # LLM Provider API Keys
  openai-api-key: {{ .Values.secrets.openaiApiKey | b64enc | quote }}
  anthropic-api-key: {{ .Values.secrets.anthropicApiKey | b64enc | quote }}
  google-genai-api-key: {{ .Values.secrets.googleGenaiApiKey | b64enc | quote }}
  tavily-api-key: {{ .Values.secrets.tavilyApiKey | b64enc | quote }}

  # Database Credentials
  postgres-password: {{ .Values.secrets.postgresPassword | b64enc | quote }}
  redis-password: {{ .Values.secrets.redisPassword | b64enc | quote }}

  # Application Security
  api-secret-key: {{ .Values.secrets.apiSecretKey | b64enc | quote }}
  api-keys: {{ .Values.secrets.apiKeys | b64enc | quote }}
