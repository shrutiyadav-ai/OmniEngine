# =============================================================================
# OmniEngine — Alembic Configuration
# =============================================================================
# Usage:
#   alembic revision --autogenerate -m "description"
#   alembic upgrade head
#   alembic downgrade -1
# =============================================================================

[alembic]
script_location = backend/alembic
prepend_sys_path = .

# Template for new migration file names
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Timezone for file_template rendering (UTC for consistency)
timezone = UTC

# Max length of characters to apply to "slug" field
truncate_slug_length = 40

# Set to 'true' to run environment during `alembic revision --autogenerate`
revision_environment = false

# Set to 'true' to allow .hierarchyc files in versions/ directory
sourceless = false

# Version file write-out format (raw = no encoding declaration)
output_encoding = utf-8

# Database URL — overridden by env.py from environment variable
sqlalchemy.url = postgresql+asyncpg://omni:omni_dev_password@localhost:5432/omniengine

[post_write_hooks]
hooks = ruff
ruff.type = exec
ruff.executable = ruff
ruff.options = format REVISION_SCRIPT_FILENAME

# =============================================================================
# Logging Configuration
# =============================================================================
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
